name: Build
on:
  push:
    branches: ["main", "unstable"]
    paths-ignore:
      - ".github/**"
      - "docs/**"
      - "resources/**"
      - "**build.yml"
      - "**.md"
      - "**.markdown"
      - "**.rasi"
      - "**.nix"
      - "**.lock"
      - "**.png"
      - "**.gif"
      - "**.svg"
      - "LICENSE"

  pull_request:
    branches: ["**"]
    paths-ignore:
      - "**.md"
      - "**.markdown"
      - "**.rasi"
      - "**.flake"

env:
  CARGO_TERM_COLOR: always
  GTK4_LAYER_SHELL_VERSION: v1.1.0

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Format and commit if needed — before anything else
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format
        run: cargo fmt

      - name: Commit formatting changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git commit -am "style: auto-format" && git push)

      # System dependencies
      - name: Update apt
        run: sudo apt-get update

      - name: Install build dependencies
        run: |
        sudo apt-get install -y \
        meson ninja-build pkg-config \
        libwayland-dev wayland-protocols \
        libgtk-4-dev \
        libxkbcommon-dev \
        libdbus-1-dev \
        libfontconfig1-dev \
        libssl-dev \
        clang

      - name: Build gtk4-layer-shell
        run: |
          curl -L "https://github.com/wmww/gtk4-layer-shell/archive/refs/tags/${GTK4_LAYER_SHELL_VERSION}.tar.gz" | tar -zx
          mv gtk4-layer-shell-* gtk4-layer-shell
          meson setup gtk4-layer-shell-build gtk4-layer-shell
          sudo ninja -C gtk4-layer-shell-build install
          sudo ldconfig

      # Build and test
      - name: Build
        run: cargo build --verbose --features wayland

      - name: Run tests
        run: cargo test --verbose --features wayland
